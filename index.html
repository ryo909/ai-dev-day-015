<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day015 — Constraint Challenge Dealer</title>
  <meta name="description" content="制約付きのお題を瞬時に作るミニチャレンジ生成ツール。（話題:HN Frontpage）">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-badge">Day015</div>
      <h1 class="header-title">Constraint Challenge Dealer</h1>
      <p class="header-desc">制約付きのお題を瞬時に作るミニチャレンジ生成ツール。（話題:HN Frontpage）</p>
    </header>
    <main class="app-main">
      <section class="tool-area">
        <div class="input-group">
          <label for="toolInput" class="input-label">制約条件</label>
          <textarea id="toolInput" class="input-textarea" rows="6" placeholder="2人 / 10分 / 道具なし / 室内"></textarea>
        </div>
        <button id="actionBtn" class="btn-primary">実行する</button>
        <div class="output-group" id="outputGroup" style="display:none">
          <label class="input-label">チャレンジお題</label>
          <div id="toolOutput" class="output-area"></div>
        </div>
      </section>
    </main>
    <footer class="app-footer">
      <span>Day015 — 30秒で遊べる制約チャレンジ</span>
      <a href="https://github.com/ryo909/ai-dev-day-015" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
